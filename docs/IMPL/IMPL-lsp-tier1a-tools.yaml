title: Wire agent-lsp Tier 1A tools into inspector
feature_slug: lsp-tier1a-tools
verdict: SUITABLE
suitability_assessment: |
    File decomposition: 5 distinct files change across 3 clearly separable concerns:
    (1) check-taxonomy.md — dead_symbol and test_coverage strategy additions,
    (2) inspector.md — cold-start probe, loop replacement, flag doc, tier header, tool list,
    (3) inspect/SKILL.md — flag doc and allowed-tools update,
    (4) CHANGELOG.md — unreleased entry,
    (5) README.md — feature list and flag doc.
    No two agents need conflicting modifications to the same file; taxonomy and inspector
    changes are in separate files; SKILL.md, CHANGELOG, and README are also distinct.

    Investigation-first items: none. All changes are additive documentation and strategy
    text. No root cause analysis required.

    Interface discoverability: the new tools (mcp__lsp__get_change_impact,
    mcp__lsp__get_cross_repo_references) have defined return shapes described in the feature
    spec. The taxonomy and inspector strategy text references specific fields (affected_symbols,
    test_callers, non_test_callers). These are fully specifiable before implementation.

    Pre-implementation status: all five items are TODO — none are partially or fully
    implemented in the current codebase.

    Parallelization value: 5 markdown/text files, no build/test cycle. Coordination value
    is moderate — keeping the tier numbering and field names consistent across taxonomy,
    inspector, and SKILL.md requires interface contracts. Speed savings over sequential are
    marginal (docs edits), but the IMPL doc provides audit trail and consistency enforcement.
    Verdict: SUITABLE WITH CAVEATS (coordination value, not speed).

    Estimated times:
    - Scout phase: ~10 min
    - Agent execution: ~15 min (3 agents × ~5 min avg, accounting for partial parallelism)
    - Merge & verification: ~3 min
    Total SAW time: ~28 min
    Sequential baseline: ~20 min
    Recommendation: Marginal speed gains; proceed for coordination value and consistency enforcement.
